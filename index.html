<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CesiumGPU - WebGPU 地球渲染引擎</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #cesiumContainer {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #no-webgpu {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-family: sans-serif;
      font-size: 1.2rem;
      text-align: center;
      background: rgba(0,0,0,0.8);
      padding: 2rem;
      border-radius: 8px;
    }
    #info {
      position: absolute;
      top: 12px;
      left: 12px;
      color: #fff;
      font-family: sans-serif;
      font-size: 0.85rem;
      background: rgba(0,0,0,0.6);
      padding: 8px 12px;
      border-radius: 6px;
      pointer-events: none;
    }
    #fps {
      position: absolute;
      top: 12px;
      right: 12px;
      color: #0f0;
      font-family: monospace;
      font-size: 0.85rem;
      background: rgba(0,0,0,0.6);
      padding: 6px 10px;
      border-radius: 6px;
      pointer-events: none;
    }

    /* ── Timeline ─────────────────────────────────────────────────────── */
    #timeline {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(10, 14, 22, 0.88);
      border-top: 1px solid rgba(255,255,255,0.12);
      padding: 8px 16px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: monospace;
      font-size: 0.82rem;
      color: #cde;
      user-select: none;
    }
    #timeline button {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      border-radius: 4px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      flex-shrink: 0;
    }
    #timeline button:hover { background: rgba(255,255,255,0.22); }
    #timeline label { flex-shrink: 0; color: #9ab; }
    #timeline input[type="date"] {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      color: #fff;
      padding: 3px 6px;
      font-family: monospace;
      font-size: 0.82rem;
      flex-shrink: 0;
    }
    #timeline input[type="range"] {
      flex: 1;
      accent-color: #4af;
      cursor: pointer;
    }
    #timeline select {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      color: #fff;
      padding: 3px 6px;
      font-family: monospace;
      font-size: 0.82rem;
      flex-shrink: 0;
      cursor: pointer;
    }
    #tlTime {
      min-width: 8ch;
      text-align: center;
      flex-shrink: 0;
      color: #7df;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer">
    <div id="no-webgpu">
      <strong>不支持 WebGPU</strong><br/>
      请使用支持 WebGPU 的浏览器<br/>
      （Chrome 113+、Edge 113+ 或开启 flag 的 Firefox Nightly）
    </div>
    <div id="info">
      <strong>CesiumGPU</strong> — WebGPU 三维渲染引擎<br/>
      🖱 拖拽旋转 &nbsp;|&nbsp; 滚轮缩放<br/>
      延迟渲染管线 + 透明物体支持
    </div>
    <div id="fps">0 FPS</div>

    <!-- ── Timeline ──────────────────────────────────────────────────── -->
    <div id="timeline">
      <button id="tlPlayPause" title="播放 / 暂停">▶</button>
      <label for="tlDate">日期</label>
      <input type="date" id="tlDate" />
      <label for="tlSlider">时刻</label>
      <input type="range" id="tlSlider" min="0" max="86399" step="60" value="43200" />
      <span id="tlTime">12:00:00</span>
      <label for="tlSpeed">速度</label>
      <select id="tlSpeed">
        <option value="1">1×</option>
        <option value="60">60×</option>
        <option value="600">600×</option>
        <option value="3600" selected>3600×</option>
        <option value="86400">86400×</option>
      </select>
      </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
